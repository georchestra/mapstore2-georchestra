site_name: MapStore2 for geOrchestra
site_url: https://georchestra.github.io/mapstore2-georchestra/

repo_url: https://github.com/georchestra/mapstore2-georchestra
repo_name: mapstore2-georchestra

docs_dir: docs
edit_uri: edit/main/docs/

theme:
  language: en 
  features:
    # - toc.integrate
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
  logo: images/georchestra-logo-white.svg
  favicon: images/favicon.ico
  name: material

extra:
  version:
    provider: mike

  generator: false
  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:psc@georchestra.org
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/georchestra
    - icon: fontawesome/brands/github
      link: https://github.com/georchestra
    - icon: fontawesome/brands/google
      link: https://groups.google.com/g/georchestra?hl=en
    - icon: fontawesome/brands/dev
      link: https://groups.google.com/group/georchestra-dev?hl=fr
    - icon: fontawesome/regular/comments
      link: https://kiwiirc.com/client/irc.libera.chat/georchestra
copyright: '© 2024 - geOrchestra'

extra_css:
    - css/extra.css

extra_javascript:
    - assets/custom_versions.js

# 1st and 2nd level tree structure to manage here
# These entries match the documentation template
# Here do not put .fr or .en in the name of the markdown: the i18n plugin manage this for you

nav:
    - Home: index.md 
    - User guide:
        - Index: user_guide/index.md
        - Getting started: user_guide/getting_started.md
        - Fonctionnal Administration: user_guide/fonctionnal_administration.md
        - Tutorials: 
              - user_guide/tuto/create_maptemplate.md
              - user_guide/tuto/iframe.md
    - Technical Guide:
        - Index: technical_guides/index.md
        - Install:
            - technical_guides/installation/index.md
            - technical_guides/installation/prerequisites.md
        - Configure:
            - technical_guides/configuration/index.md
            - technical_guides/configuration/general.md
            - technical_guides/configuration/database.md
            - technical_guides/configuration/ldap.md
            - technical_guides/configuration/application.md
            - technical_guides/configuration/other.md
            - technical_guides/configuration/catalog.md
        - Develop:
            - technical_guides/developer_guide/index.md
            - technical_guides/developer_guide/integration.md
        - Documenter:
            - technical_guides/developer_guide/documentation.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
    - search
    - callouts
    # - toc-md:
        # toc_page_title: Contents
        # toc_page_description: Summary of the section
        # header_level: 3
        # pickup_description_meta: false
        # pickup_description_class: false
        # output_path: tableofcontent.md
        # output_log: true
        # ignore_page_pattern: index.md
        # remove_navigation_page_pattern: index.md
        # template_dir_path: custom_template
    - exclude:
        glob:
          - tableofcontent.md
    - i18n:
        docs_structure: suffix
        fallback_to_default: true
        reconfigure_material: true
        reconfigure_search: true
        languages:
          - locale: en
            default: true
            name: English
            build: true
            site_name: "MapStore2 for geOrchestra"
          - locale: fr
            name: Français
            build: true
            site_name: "MapStore2 pour geOrchestra"
            nav_translations:
              Home: "Accueil"
              MapStore Guide: "Guide MapStore"
              User guide: "Guide utilisateur"
              Index: "Sommaire"
              Getting started: "Prendre en main"
              Fonctionnal Administration: "Administration fonctionnelle"
              Tutorials: "Tutoriels"
              Install: "Installer"
              Configure: "Configurer"
              Develop: "Développer"
              Global overview: "Vue globale"
              Menus and toolbars: "Barres ou menus d''outils"
              msIframe: "msIframe"
              Syntax help: "Aide syntaxe"
              Technical guides: "Guides techniques"
              Technical Guide: "Guide technique"
              Installation: "Installer"
              Configuration: "Configuration"
              General Configuration Principles: "Principes généraux de configuration"
              Database Configuration: "Configuration de la base de données"
              Application Configuration: "Configuration applicative"
              Other Configuration Notes: "Autres notes de configuration"
              Administration: "Administrer"
              Developer Guide: "Guide développeur"
              Documentation Guide: "Guide de documentation"
              Developer guide: "Développer"
              Integration with geOrchestra: "Intégration avec geOrchestra"
              Documentation Maintenance: "Maintenance de la documentation"

    - git-revision-date-localized:
        enable_creation_date: true


